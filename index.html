<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TOA Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-frame" class="centered">
        <h1>TERMINAL</h1>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button id="login-btn">INITIALIZE ACCESS</button>
    </div>

    <div id="terminal-frame" class="hidden">
        <div id="tree-container"></div>
    </div>

    <!-- File popup -->
    <div id="file-popup" class="hidden">
        <div id="popup-content">
            <h2 id="file-title"></h2>
            <textarea id="file-text"></textarea>
            <button id="close-popup">CLOSE</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
